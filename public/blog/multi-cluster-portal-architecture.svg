<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="10" y="10" width="880" height="450" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ===== K8s clusters (left) ===== -->
  <!-- Cluster A -->
  <rect x="36" y="60" width="190" height="86" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="131" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">K8s Cluster A</text>
  <text x="50" y="106" font-size="10.5" fill="#1e40af">• cluster collector (Deployment)</text>
  <text x="50" y="124" font-size="10.5" fill="#1e40af">• agent (DaemonSet)</text>

  <!-- Cluster B -->
  <rect x="36" y="192" width="190" height="86" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="131" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">K8s Cluster B</text>
  <text x="50" y="238" font-size="10.5" fill="#1e40af">• cluster collector (Deployment)</text>
  <text x="50" y="256" font-size="10.5" fill="#1e40af">• agent (DaemonSet)</text>

  <!-- Cluster C -->
  <rect x="36" y="324" width="190" height="86" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="131" y="348" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">K8s Cluster C</text>
  <text x="50" y="370" font-size="10.5" fill="#1e40af">• cluster collector (Deployment)</text>
  <text x="50" y="388" font-size="10.5" fill="#1e40af">• agent (DaemonSet)</text>

  <text x="131" y="432" text-anchor="middle" font-size="10.5" fill="#94a3b8">หลาย cloud / on-prem</text>

  <!-- ===== Central OTel Collector ===== -->
  <rect x="300" y="190" width="150" height="90" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.7"/>
  <text x="375" y="228" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1e40af">OTel Collector</text>
  <text x="375" y="248" text-anchor="middle" font-size="11" fill="#1e40af">(ส่วนกลาง)</text>

  <!-- ===== ClickHouse ===== -->
  <rect x="510" y="195" width="140" height="80" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.7"/>
  <text x="580" y="228" text-anchor="middle" font-size="13.5" font-weight="700" fill="#92400e">ClickHouse</text>
  <text x="580" y="248" text-anchor="middle" font-size="10.5" fill="#92400e">logs · metrics · traces</text>

  <!-- ===== Next.js Portal ===== -->
  <rect x="710" y="195" width="155" height="80" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.7"/>
  <text x="787" y="228" text-anchor="middle" font-size="13.5" font-weight="700" fill="#5b21b6">Next.js Portal</text>
  <text x="787" y="248" text-anchor="middle" font-size="10.5" fill="#5b21b6">อ่านอย่างเดียว</text>

  <!-- ===== User ===== -->
  <rect x="712" y="60" width="150" height="56" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="787" y="84" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">ผู้ใช้ / ทีม</text>
  <text x="787" y="102" text-anchor="middle" font-size="10.5" fill="#64748b">เลือก cluster จาก UI</text>

  <!-- arrows: clusters -> collector (push) -->
  <line x1="226" y1="103" x2="298" y2="218" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="226" y1="235" x2="298" y2="235" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="226" y1="367" x2="298" y2="252" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="250" y="175" text-anchor="middle" font-size="10.5" font-weight="600" fill="#64748b">OTLP / TLS · push</text>
  <text x="250" y="300" text-anchor="middle" font-size="10" fill="#94a3b8">tag: k8s.cluster.name</text>

  <!-- arrow: collector -> clickhouse -->
  <line x1="450" y1="235" x2="508" y2="235" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="479" y="227" text-anchor="middle" font-size="10" fill="#64748b">write</text>

  <!-- arrow: clickhouse -> portal (read-only) -->
  <line x1="650" y1="235" x2="708" y2="235" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="679" y="227" text-anchor="middle" font-size="10" fill="#64748b">read-only</text>

  <!-- arrow: user -> portal (SSO) -->
  <line x1="787" y1="116" x2="787" y2="193" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="797" y="160" text-anchor="start" font-size="10.5" font-weight="600" fill="#64748b">SSO / OIDC</text>
</svg>
