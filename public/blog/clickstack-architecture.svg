<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="10" y="10" width="880" height="450" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- clusters -->
  <rect x="36" y="64" width="166" height="86" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="119" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">K8s clusters</text>
  <text x="119" y="118" text-anchor="middle" font-size="10.5" fill="#64748b">OTel DaemonSet</text>
  <text x="119" y="135" text-anchor="middle" font-size="10.5" fill="#64748b">push logs/metrics/traces</text>

  <!-- OTel collector -->
  <rect x="248" y="70" width="140" height="74" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.6"/>
  <text x="318" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">OTel Collector</text>
  <text x="318" y="122" text-anchor="middle" font-size="10.5" fill="#1e40af">(ส่วนกลาง)</text>

  <!-- ClickHouse -->
  <rect x="438" y="64" width="150" height="86" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.8"/>
  <text x="513" y="96" text-anchor="middle" font-size="13.5" font-weight="700" fill="#92400e">ClickHouse</text>
  <text x="513" y="115" text-anchor="middle" font-size="10" fill="#92400e">logs·metrics·traces</text>
  <text x="513" y="133" text-anchor="middle" font-size="10" fill="#92400e">(hot/cold tiered)</text>

  <!-- HyperDX -->
  <rect x="648" y="54" width="204" height="56" rx="10" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.6"/>
  <text x="750" y="78" text-anchor="middle" font-size="12.5" font-weight="700" fill="#115e59">HyperDX</text>
  <text x="750" y="95" text-anchor="middle" font-size="10.5" fill="#115e59">ad-hoc search / explore</text>

  <!-- Portal -->
  <rect x="648" y="124" width="204" height="56" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.6"/>
  <text x="750" y="148" text-anchor="middle" font-size="12.5" font-weight="700" fill="#5b21b6">Next.js Portal</text>
  <text x="750" y="165" text-anchor="middle" font-size="10.5" fill="#5b21b6">dashboards ของทีม</text>

  <!-- row1 arrows -->
  <line x1="202" y1="107" x2="246" y2="107" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="224" y="99" text-anchor="middle" font-size="9.5" fill="#64748b">OTLP/TLS</text>
  <line x1="388" y1="107" x2="436" y2="107" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="412" y="99" text-anchor="middle" font-size="9.5" fill="#64748b">write</text>
  <line x1="588" y1="92" x2="646" y2="82" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="588" y1="120" x2="646" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="612" y="140" text-anchor="middle" font-size="9.5" fill="#64748b">read</text>

  <!-- storage tier zone -->
  <rect x="252" y="238" width="468" height="196" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="270" y="262" font-size="12" font-weight="700" fill="#94a3b8">ภายใน ClickHouse — hot/cold tiered storage</text>

  <!-- connector clickhouse -> storage zone -->
  <path d="M500,150 C480,190 470,205 466,236" fill="none" stroke="#94a3b8" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="540" y="200" text-anchor="middle" font-size="10" fill="#94a3b8">data แบ่ง 2 tier</text>

  <!-- hot tier -->
  <rect x="296" y="288" width="170" height="86" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.7"/>
  <text x="381" y="316" text-anchor="middle" font-size="12.5" font-weight="700" fill="#166534">Hot tier</text>
  <text x="381" y="335" text-anchor="middle" font-size="10.5" fill="#166534">local EBS · &lt; 3 วัน</text>
  <text x="381" y="353" text-anchor="middle" font-size="10.5" fill="#166534">ไม่มีค่า request</text>

  <!-- cold tier -->
  <rect x="528" y="288" width="170" height="86" rx="10" fill="#ffedd5" stroke="#ea580c" stroke-width="1.7"/>
  <text x="613" y="316" text-anchor="middle" font-size="12.5" font-weight="700" fill="#9a3412">Cold tier</text>
  <text x="613" y="335" text-anchor="middle" font-size="10.5" fill="#9a3412">S3 · &gt; 3 วัน</text>
  <text x="613" y="353" text-anchor="middle" font-size="10.5" fill="#9a3412">(archive)</text>

  <!-- hot -> cold TTL -->
  <line x1="466" y1="331" x2="526" y2="331" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="496" y="323" text-anchor="middle" font-size="9.5" fill="#64748b">TTL 3 วัน</text>

  <text x="486" y="408" text-anchor="middle" font-size="10.5" fill="#64748b">query ข้อมูลล่าสุด → อ่าน hot ไม่แตะ S3</text>
</svg>
