<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="10" y="10" width="880" height="580" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ===== Zone 1: contribute -> build ===== -->
  <rect x="30" y="40" width="840" height="150" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="46" y="62" font-size="12.5" font-weight="700" fill="#94a3b8">① Contribute → auto-build image</text>

  <!-- contributors -->
  <rect x="48" y="92" width="130" height="76" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="113" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">สมาชิกทีม</text>
  <text x="113" y="143" text-anchor="middle" font-size="11" fill="#64748b">ใครก็ส่ง MR ได้</text>

  <!-- workspace repo -->
  <rect x="238" y="82" width="200" height="96" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.8"/>
  <text x="338" y="104" text-anchor="middle" font-size="13.5" font-weight="700" fill="#5b21b6">Workspace repo · git</text>
  <text x="338" y="124" text-anchor="middle" font-size="11.5" fill="#5b21b6">SKILL.md · scripts</text>
  <text x="338" y="141" text-anchor="middle" font-size="11.5" fill="#5b21b6">Dockerfile · CI Component</text>
  <text x="338" y="161" text-anchor="middle" font-size="11" fill="#7c3aed" font-family="ui-monospace, monospace">platform/core</text>

  <!-- build CI -->
  <rect x="498" y="92" width="150" height="76" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.6"/>
  <text x="573" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">CI: Build Image</text>
  <text x="573" y="143" text-anchor="middle" font-size="11" fill="#1e40af">auto ทุก commit</text>

  <!-- registry -->
  <rect x="708" y="92" width="150" height="76" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.6"/>
  <text x="783" y="121" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Registry</text>
  <text x="783" y="142" text-anchor="middle" font-size="11" fill="#166534" font-family="ui-monospace, monospace">ai-review:0.1.0</text>

  <!-- zone1 arrows -->
  <line x1="178" y1="130" x2="236" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="207" y="122" text-anchor="middle" font-size="10" fill="#64748b">เปิด MR</text>
  <line x1="438" y1="130" x2="496" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="467" y="122" text-anchor="middle" font-size="10" fill="#64748b">merge→main</text>
  <line x1="648" y1="130" x2="706" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="677" y="122" text-anchor="middle" font-size="10" fill="#64748b">push image</text>

  <!-- ===== Zone 2: execute ===== -->
  <rect x="30" y="330" width="650" height="160" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="46" y="352" font-size="12.5" font-weight="700" fill="#94a3b8">② Pipeline ดึง image มารัน code review</text>

  <!-- consumer repo (stacked = many repos) -->
  <rect x="64" y="392" width="200" height="86" rx="10" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.2"/>
  <rect x="56" y="384" width="200" height="86" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="156" y="412" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Consumer repos</text>
  <text x="156" y="431" text-anchor="middle" font-size="11" fill="#64748b">include CI Component</text>
  <text x="156" y="450" text-anchor="middle" font-size="10.5" fill="#64748b" font-family="ui-monospace, monospace">.gitlab-ci.yml</text>

  <!-- review CI -->
  <rect x="430" y="386" width="210" height="82" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.6"/>
  <text x="535" y="414" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">CI: Code Review</text>
  <text x="535" y="434" text-anchor="middle" font-size="11" fill="#1e40af">รัน claude + SKILL.md</text>

  <!-- zone2 arrows: loop -->
  <line x1="256" y1="412" x2="428" y2="412" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="342" y="404" text-anchor="middle" font-size="10" fill="#64748b">MR event</text>
  <line x1="428" y1="448" x2="258" y2="448" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="342" y="463" text-anchor="middle" font-size="10" fill="#64748b">post review note กลับเข้า MR</text>

  <!-- registry -> review CI (pull image) -->
  <path d="M783,168 C783,300 535,300 535,384" fill="none" stroke="#16a34a" stroke-width="2.2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="690" y="285" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">pull image :0.1.0</text>
</svg>
