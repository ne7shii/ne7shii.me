<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 580" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <!-- card -->
  <rect x="10" y="10" width="860" height="560" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- legend -->
  <line x1="45" y1="48" x2="85" y2="48" stroke="#a78bfa" stroke-width="2.5" stroke-dasharray="6 5"/>
  <text x="92" y="52" font-size="13" fill="#475569">Control / coordination (ผ่าน Headscale)</text>
  <line x1="45" y1="72" x2="85" y2="72" stroke="#16a34a" stroke-width="3"/>
  <text x="92" y="76" font-size="13" fill="#475569">WireGuard P2P tunnel — เข้ารหัส, site-to-site โดยตรง</text>

  <!-- Headscale control server -->
  <rect x="340" y="40" width="200" height="74" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.8"/>
  <text x="440" y="66" text-anchor="middle" font-size="15" font-weight="700" fill="#5b21b6">Headscale</text>
  <text x="440" y="85" text-anchor="middle" font-size="13" fill="#5b21b6">Control Server</text>
  <text x="440" y="103" text-anchor="middle" font-size="11" fill="#7c3aed" font-family="ui-monospace, monospace">headscale.example.com</text>

  <!-- control plane dashed lines -->
  <path d="M440,114 C260,180 200,250 145,332" fill="none" stroke="#a78bfa" stroke-width="2.2" stroke-dasharray="6 5"/>
  <path d="M440,114 L440,332" fill="none" stroke="#a78bfa" stroke-width="2.2" stroke-dasharray="6 5"/>
  <path d="M440,114 C620,180 680,250 735,332" fill="none" stroke="#a78bfa" stroke-width="2.2" stroke-dasharray="6 5"/>

  <!-- data plane: P2P tunnels between subnet routers -->
  <line x1="205" y1="353" x2="380" y2="353" stroke="#16a34a" stroke-width="3"/>
  <line x1="560" y1="353" x2="675" y2="353" stroke="#16a34a" stroke-width="3"/>
  <path d="M145,374 C145,520 735,520 735,374" fill="none" stroke="#16a34a" stroke-width="3"/>
  <text x="440" y="544" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="600">tunnel ตรงระหว่าง site — ไม่ผ่าน gateway กลาง</text>

  <!-- Site A -->
  <rect x="55" y="292" width="180" height="208" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="145" y="313" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Site A · สำนักงานใหญ่</text>
  <rect x="85" y="332" width="120" height="42" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.6"/>
  <text x="145" y="358" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1e40af">Subnet Router</text>
  <text x="145" y="408" text-anchor="middle" font-size="11.5" fill="#64748b">LAN 192.168.10.0/24</text>
  <rect x="100" y="425" width="26" height="22" rx="4" fill="#e2e8f0" stroke="#94a3b8"/>
  <rect x="132" y="425" width="26" height="22" rx="4" fill="#e2e8f0" stroke="#94a3b8"/>
  <rect x="164" y="425" width="26" height="22" rx="4" fill="#e2e8f0" stroke="#94a3b8"/>

  <!-- Site B -->
  <rect x="350" y="292" width="180" height="208" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="440" y="313" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Site B · สาขา</text>
  <rect x="380" y="332" width="120" height="42" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.6"/>
  <text x="440" y="358" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1e40af">Subnet Router</text>
  <text x="440" y="408" text-anchor="middle" font-size="11.5" fill="#64748b">LAN 192.168.20.0/24</text>
  <rect x="395" y="425" width="26" height="22" rx="4" fill="#e2e8f0" stroke="#94a3b8"/>
  <rect x="427" y="425" width="26" height="22" rx="4" fill="#e2e8f0" stroke="#94a3b8"/>
  <rect x="459" y="425" width="26" height="22" rx="4" fill="#e2e8f0" stroke="#94a3b8"/>

  <!-- Cloud VPC -->
  <rect x="645" y="292" width="180" height="208" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="735" y="313" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Cloud VPC</text>
  <rect x="675" y="332" width="120" height="42" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.6"/>
  <text x="735" y="358" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1e40af">Subnet Router</text>
  <text x="735" y="408" text-anchor="middle" font-size="11.5" fill="#64748b">VPC 10.0.0.0/16</text>
  <rect x="690" y="425" width="26" height="22" rx="4" fill="#e2e8f0" stroke="#94a3b8"/>
  <rect x="722" y="425" width="26" height="22" rx="4" fill="#e2e8f0" stroke="#94a3b8"/>
  <rect x="754" y="425" width="26" height="22" rx="4" fill="#e2e8f0" stroke="#94a3b8"/>
</svg>
